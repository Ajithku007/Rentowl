<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>H-Scroll Test</title>
<style>
  /* Isolated stylesheet with extra specificity & !important to override other rules */
  :root { --card-w: 240px; }

  body { font-family: Arial, Helvetica, sans-serif; margin:40px; background:#f5f7fb; }

  /* wrapper forced to flex row */
  .test-horizontal-scroll {
    display: flex !important;
    flex-direction: row !important;
    gap: 18px !important;
    overflow-x: auto !important;
    padding: 18px !important;
    scroll-snap-type: x mandatory !important;
    -webkit-overflow-scrolling: touch !important;
    scroll-behavior: smooth !important;
    background: linear-gradient(180deg,#fff,#f7f9fc) !important;
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(2,6,23,0.04);
  }

  /* hide scrollbar for Webkit */
  .test-horizontal-scroll::-webkit-scrollbar { display:none; }

  /* card basics */
  .test-horizontal-scroll > .test-card {
    flex: 0 0 var(--card-w) !important;
    width: var(--card-w) !important;
    min-width: var(--card-w) !important;
    height: 180px;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 6px 18px rgba(2,6,23,0.07);
    scroll-snap-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    color:#0b2535;
    user-select: none;
  }

  /* image mock + text */
  .test-card .img {
    width:100%; height:110px; background-size:cover; background-position:center;
  }
  .test-card h4 { margin:10px 0 0; font-size:16px; }

  /* quick hover to check effect */
  .test-card:hover { transform: translateY(-6px) scale(1.03); transition: transform .22s ease; }
</style>
</head>
<body>

<h2>Horizontal Scroll — Isolated Test</h2>
<p>Save and open. Cards MUST be side-by-side and scroll horizontally.</p>

<div class="test-horizontal-scroll" id="testScroll">
  <div class="test-card">
    <div class="img" style="background-image:url('https://via.placeholder.com/400x240?text=1');"></div>
    <h4>Card 1</h4>
  </div>

  <div class="test-card">
    <div class="img" style="background-image:url('https://via.placeholder.com/400x240?text=2');"></div>
    <h4>Card 2</h4>
  </div>

  <div class="test-card">
    <div class="img" style="background-image:url('https://via.placeholder.com/400x240?text=3');"></div>
    <h4>Card 3</h4>
  </div>

  <div class="test-card">
    <div class="img" style="background-image:url('https://via.placeholder.com/400x240?text=4');"></div>
    <h4>Card 4</h4>
  </div>
    <div class="test-card">
    <div class="img" style="background-image:url('https://via.placeholder.com/400x240?text=4');"></div>
    <h4>Card 4</h4>
  </div>
    <div class="test-card">
    <div class="img" style="background-image:url('https://via.placeholder.com/400x240?text=4');"></div>
    <h4>Card 4</h4>
  </div>
</div>

</body>
</html>
