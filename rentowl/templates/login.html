
{% load crispy_forms_tags %}

           <form method="post" action="{% url 'accounts:userlogin' %}">
             {% csrf_token %}
             {{ loginform|crispy }}
             <div class="d-flex justify-content-center">
                <button class="btn btn-danger rounded ">Login</button>
             </div>
           </form>


{% if messages %}
<ul>
    {% for i in messages %}
    <li>{{ i }}</li>
    {% endfor %}
</ul>
{% endif %}
