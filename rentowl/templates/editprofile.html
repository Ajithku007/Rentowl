{% extends 'base.html' %}
<style>
  body {
    background: linear-gradient(135deg, #f8f9fa, #eef1f5);
  }

  .form-card {
    max-width: 520px;
    width: 100%;
    background: #ffffff;
    border: none;
  }

  input,
  select,
  textarea {
    border-radius: 12px !important;
    padding: 10px 14px !important;
    transition: all 0.25s ease;
  }

  input:focus,
  select:focus,
  textarea:focus {
    border-color: #dc3545 !important;
    box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.15) !important;
  }

  label {
    font-weight: 500;
    margin-bottom: 6px;
  }

  .submit-btn {
    background: linear-gradient(135deg, #dc3545, #b02a37);
    color: #fff;
    border-radius: 999px;
    font-weight: 600;
    border: none;
    transition: all 0.2s ease;
  }


</style>

{% load crispy_forms_tags %}

<div class="container d-flex justify-content-center mt-5 mb-5">
  <div class="form-card shadow-lg rounded-4 p-4">

    <h4 class="text-center fw-bold mb-1">Submit Details</h4>
    <p class="text-center text-muted mb-4">Fill in the information below</p>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form|crispy }}

      <div class="d-flex justify-content-center mt-4">
        <button type="submit" class="btn submit-btn btn-danger rounded px-5 py-2">
          Submit
        </button>
      </div>
    </form>

  </div>
</div>


{% endblock %}
